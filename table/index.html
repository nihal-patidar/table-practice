<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Table Practice</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>Table Practice</h2>
    <button id="menuBtn">☰</button>
  </div>

  <!-- MENU (HIDDEN FILTER PANEL) -->
  <div id="menuPanel" class="menu hidden">

    <h3>Practice Settings</h3>

    <input type="number" id="minTable" placeholder="Min Table" />
    <input type="number" id="maxTable" placeholder="Max Table" />
    <button id="rangeBtn">Start Range</button>

    <input type="number" id="singleTable" placeholder="Single Table" />
    <button id="singleBtn">Practice One</button>

    <!-- Weak Tables Section -->
    <div id="weakSection">
      <h4>Weak Tables</h4>
      <div id="weakList"></div>
    </div>

  </div>

  <!-- QUESTION -->
  <div class="question" id="question">Start Practice</div>

  <!-- INPUT -->
  <input id="answer" type="text" readonly />

  <!-- KEYBOARD -->
  <div class="keyboard" id="keyboard"></div>

</div>

<script src="script.js"></script>
</body>
</html>
